apiVersion: apps/v1
kind: Deployment
metadata:
  name: containerize-backend
  labels:
    app: containerize-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: containerize-backend
  template:
    metadata:
      labels:
        app: containerize-backend
    spec:
      containers:
        - name: containerize-backend
          image: harbor.devops.cicd.test/containerizev1/containerize-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          emptyDir: {}
