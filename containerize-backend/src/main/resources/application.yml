server:
  port: 8000
  servlet:
    context-path: /

spring:
  application:
    name: containerize-backend
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    default-property-inclusion: non_null

app:
  upload:
    directory: ./uploads
    max-size: 536870912
    allowed-extensions: .jar,.war
    allowed-content-types: application/java-archive,application/x-java-archive
    cleanup-delay-seconds: 3600
  template:
    directory: classpath:templates
  ssl:
    trust-all: false
  rate-limit:
    enabled: true
    general-requests-per-minute: 30
    heavy-requests-per-minute: 10
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8000,http://127.0.0.1:8000,http://localhost:4000,http://127.0.0.1:4000,http://localhost:5173,http://127.0.0.1:5173}

springdoc:
  api-docs:
    path: /api/openapi.json
  swagger-ui:
    path: /api/docs

logging:
  level:
    com.containerize: DEBUG
    org.springframework.web: INFO
