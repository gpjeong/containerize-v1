services:
  # ============================================================
  # Backend - Spring Boot (포트 8000)
  # ============================================================
  backend:
    build:
      context: ./containerize-backend
      dockerfile: Dockerfile
    image: containerize-backend
    container_name: containerize-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    networks:
      - containerize-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

  # ============================================================
  # Frontend - React (포트 4000)
  # 기본값: 개발 모드 (핫 리로드 지원)
  # 프로덕션 모드: COMPOSE_FILE=docker-compose.yaml:docker-compose.prod.yaml
  # ============================================================
  frontend:
    build:
      context: ./containerize-frontend
      dockerfile: Dockerfile
      target: development
    image: containerize-frontend
    container_name: containerize-frontend
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./containerize-frontend/src:/app/src
      - ./containerize-frontend/public:/app/public
      - ./containerize-frontend/index.html:/app/index.html
    networks:
      - containerize-network
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

networks:
  containerize-network:
    name: containerize-network
    driver: bridge

volumes:
  uploads:
    name: containerize-uploads
